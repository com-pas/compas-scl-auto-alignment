name: SonarCloud Analysis

on: 
  workflow_run:
    workflows: [SonarCloud Build]
    types: [completed]

jobs:
  sonar-check:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
      pull-requests: read
    steps:
    - name: Download PR number artifact
      if: github.event.workflow_run.event == 'pull_request'
      uses: dawidd6/action-download-artifact@1f8785ff7a5130826f848e7f72725c85d241860f # v18
      with:
        workflow: SonarCloud Build
        run_id: ${{ github.event.workflow_run.id }}
        name: PR_NUMBER
    - name: Read PR_NUMBER.txt
      if: github.event.workflow_run.event == 'pull_request'
      id: pr_number
      uses: juliangruber/read-file-action@271ff311a4947af354c6abcd696a306553b9ec18 # v1
      with:
        path: ./PR_NUMBER.txt
    - name: Request GitHub API for PR data
      if: github.event.workflow_run.event == 'pull_request'
      uses: octokit/request-action@05a2312de9f8207044c4c9e41fe19703986acc13 # v2.x
      id: get_pr_data
      with:
        route: GET /repos/${{ github.event.repository.full_name }}/pulls/${{ steps.pr_number.outputs.content }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract PR data
      if: github.event.workflow_run.event == 'pull_request'
      id: pr_data
      env:
        PR_JSON: ${{ steps.get_pr_data.outputs.data }}
      run: |
        echo "pr_head_ref=$(echo "$PR_JSON" | jq -r '.head.ref')" >> "$GITHUB_OUTPUT"
        echo "pr_number=$(echo "$PR_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"
        echo "pr_base_ref=$(echo "$PR_JSON" | jq -r '.base.ref')" >> "$GITHUB_OUTPUT"
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: ${{ github.event.repository.full_name }}
        ref: ${{ github.event.workflow_run.head_sha }}
        fetch-depth: 0
        
    - name: Checkout base branch
      if: github.event.workflow_run.event == 'pull_request'
      env:
        CLONE_URL: ${{ github.event.repository.clone_url }}
        BASE_REF: ${{ steps.pr_data.outputs.pr_base_ref }}
        HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      run: |
        git remote add upstream "$CLONE_URL"
        git fetch upstream
        git checkout -B "$BASE_REF" "upstream/$BASE_REF"
        git checkout -B "$HEAD_BRANCH" "origin/$HEAD_BRANCH"
        git clean -ffdx && git reset --hard HEAD
    - name: Download build artifacts
      uses: dawidd6/action-download-artifact@1f8785ff7a5130826f848e7f72725c85d241860f # v18
      with:
        workflow: SonarCloud Build
        run_id: ${{ github.event.workflow_run.id }}
        name: build-artifacts
    - name: Cache SonarCloud packages
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'maven'

    - name: Set Common Sonar Variables
      id: sonar_env
      # Use $GITHUB_OUTPUT; the legacy ##[set-output] syntax is deprecated and disabled.
      run: |
        echo "sonar_opts=-Dsonar.host.url=https://sonarcloud.io -Dsonar.projectKey=com-pas_compas-scl-auto-alignment -Dsonar.organization=com-pas" >> "$GITHUB_OUTPUT"
    - name: Create custom Maven Settings.xml
      uses: whelk-io/maven-settings-xml-action@9dc09b23833fa9aa7f27b63db287951856f3433d # v22
      with:
        output_file: custom_maven_settings.xml
        servers: '[{ "id": "github-packages-compas", "username": "OWNER", "password": "${{ secrets.GITHUB_TOKEN }}" }]'
    - name: Build and analyze (Pull Request)
      if: ${{ github.event.workflow_run.event == 'pull_request' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_SCM_REVISION: ${{ github.event.workflow_run.head_sha }}
      run: |
        mvn -B -s custom_maven_settings.xml -Psonar \
          ${{ steps.sonar_env.outputs.sonar_opts }} \
          "-Dsonar.pullrequest.branch=${{ steps.pr_data.outputs.pr_head_ref }}" \
          "-Dsonar.pullrequest.key=${{ steps.pr_data.outputs.pr_number }}" \
          "-Dsonar.pullrequest.base=${{ steps.pr_data.outputs.pr_base_ref }}" \
          "-Dsonar.scm.revision=$SONAR_SCM_REVISION" \
          org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
    - name: Build and analyze (Push)
      if: ${{ github.event.workflow_run.event == 'push' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_SCM_REVISION: ${{ github.event.workflow_run.head_sha }}
        SONAR_BRANCH_NAME: ${{ github.event.workflow_run.head_branch }}
      run: |
        mvn -B -s custom_maven_settings.xml -Psonar \
          ${{ steps.sonar_env.outputs.sonar_opts }} \
          "-Dsonar.scm.revision=$SONAR_SCM_REVISION" \
          "-Dsonar.branch.name=$SONAR_BRANCH_NAME" \
          org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
